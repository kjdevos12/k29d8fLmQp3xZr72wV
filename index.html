<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional Download Page</title>
<style>
    /* Reset and full-page layout */
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; width:100%; font-family: 'Segoe UI', sans-serif; }

    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        overflow: hidden;
    }

    /* Glowing animated header */
    .header-text {
        font-size: 5rem;
        color: #00ff00;
        text-align: center;
        text-shadow:
            0 0 10px #00ff00,
            0 0 20px #00ff00,
            0 0 30px #00ff00,
            0 0 40px #00ff00,
            0 0 50px #00ff00;
        animation: glow 2s ease-in-out infinite alternate;
        margin-bottom: 50px;
    }

    @keyframes glow {
        from { text-shadow:
            0 0 5px #00ff00,
            0 0 10px #00ff00,
            0 0 15px #00ff00,
            0 0 20px #00ff00; }
        to { text-shadow:
            0 0 20px #00ff00,
            0 0 30px #00ff00,
            0 0 40px #00ff00,
            0 0 50px #00ff00; }
    }

    /* Download button styling */
    .download-btn {
        padding: 20px 50px;
        font-size: 1.5rem;
        color: white;
        background: linear-gradient(45deg, #28a745, #20c997);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(0,255,0,0.5);
        transition: all 0.3s ease;
    }

    .download-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 40px rgba(0,255,0,0.8);
    }

    /* Optional: subtle particle background */
    .particles {
        position: absolute;
        top:0; left:0;
        width:100%; height:100%;
        z-index: -1;
        background: url('https://cdn.pixabay.com/photo/2017/08/30/01/05/stars-2695563_960_720.png');
        background-size: cover;
        opacity: 0.1;
        animation: move 20s linear infinite;
    }

    @keyframes move {
        0% { background-position:0 0; }
        100% { background-position:1000px 1000px; }
    }
</style>
</head>
<body>

<div class="particles"></div>

<h1 class="header-text">War Thunder's Best ESP</h1>

<button class="download-btn" onclick="window.location.href='yourfile.zip'">
    Download now for Mac
</button>

</body>
</html>
